version: '3.8'

services:
  postgres:
    image: postgis/postgis:14-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thiltapes_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: thiltapes_db
      DB_ADMIN_HOST: postgres
      DB_ADMIN_PORT: 5432
      DB_ADMIN_USER: postgres
      DB_ADMIN_PASSWORD: postgres
      CORS_ORIGIN: https://thiltapes-prod.trycloudflare.com
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
